services:
  - type: web
    name: doom-research
    runtime: python
    buildCommand: ./scripts/render_build.sh
    startCommand: gunicorn app:app --timeout 1200 --workers 1 --threads 4
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ANTHROPIC_MODEL
        value: claude-opus-4-6
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: GPTR_ENABLED
        value: "true"
      - key: GPTR_LLM_PROVIDER
        value: openai
      - key: GPTR_FAST_LLM
        value: "openai:gpt-4o-mini"
      - key: GPTR_SMART_LLM
        value: "openai:gpt-5.4"
      - key: GPTR_STRATEGIC_LLM
        value: "openai:o3"
      - key: GPTR_MAX_SEARCH_RESULTS
        value: "10"
      - key: GPTR_MIN_SOURCES
        value: "8"
      - key: GPTR_MAX_PASSES
        value: "2"
      - key: GPTR_REPORT_TYPE
        value: research_report
      - key: GPTR_RETRIEVER
        value: tavily
      - key: REDIS_URL
        sync: false
      - key: RESEARCH_USE_WORKER
        value: "true"
      - key: RESEARCH_QUEUE_NAME
        value: research_jobs
      - key: TWITTERAPI_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false

  - type: worker
    name: doom-research-worker
    runtime: python
    buildCommand: ./scripts/render_build.sh
    startCommand: python worker.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ANTHROPIC_MODEL
        value: claude-opus-4-6
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: GPTR_ENABLED
        value: "true"
      - key: GPTR_LLM_PROVIDER
        value: openai
      - key: GPTR_FAST_LLM
        value: "openai:gpt-4o-mini"
      - key: GPTR_SMART_LLM
        value: "openai:gpt-5.4"
      - key: GPTR_STRATEGIC_LLM
        value: "openai:o3"
      - key: GPTR_MAX_SEARCH_RESULTS
        value: "10"
      - key: GPTR_MIN_SOURCES
        value: "8"
      - key: GPTR_MAX_PASSES
        value: "2"
      - key: GPTR_REPORT_TYPE
        value: research_report
      - key: GPTR_RETRIEVER
        value: tavily
      - key: REDIS_URL
        sync: false
      - key: RESEARCH_USE_WORKER
        value: "true"
      - key: RESEARCH_QUEUE_NAME
        value: research_jobs
      - key: TWITTERAPI_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
