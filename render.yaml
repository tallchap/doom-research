services:
  - type: web
    name: doom-research
    runtime: python
    buildCommand: ./scripts/render_build.sh
    startCommand: gunicorn app:app --timeout 1200 --workers 1 --threads 4
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ANTHROPIC_MODEL
        value: claude-opus-4-6
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PERPLEXITY_API_KEY
        sync: false
      - key: PERPLEXITY_MODEL
        value: sonar-deep-research
      - key: REDIS_URL
        sync: false
      - key: RESEARCH_USE_WORKER
        value: "true"
      - key: RESEARCH_QUEUE_NAME
        value: research_jobs
      - key: TWITTERAPI_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false

  - type: worker
    name: doom-research-worker
    runtime: python
    buildCommand: ./scripts/render_build.sh
    startCommand: python worker.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ANTHROPIC_MODEL
        value: claude-opus-4-6
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PERPLEXITY_API_KEY
        sync: false
      - key: PERPLEXITY_MODEL
        value: sonar-deep-research
      - key: REDIS_URL
        sync: false
      - key: RESEARCH_USE_WORKER
        value: "true"
      - key: RESEARCH_QUEUE_NAME
        value: research_jobs
      - key: TWITTERAPI_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
